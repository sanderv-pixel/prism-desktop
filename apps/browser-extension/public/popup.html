<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prism</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e2e2e8;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    p { font-size: 13px; color: #9ca3af; margin: 0 0 12px; line-height: 1.5; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    .dot.paused { background: #ef4444; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button.secondary { background: #27272a; }
    button:hover { opacity: 0.9; }
    .muted { font-size: 11px; color: #6b7280; }
  </style>
</head>
<body>
  <h1>Prism for AI Chat</h1>
  <p>Tiny, relevant ads during AI wait states. No chat history collected.</p>
  <div class="status">
    <span id="statusDot" class="dot"></span>
    <span id="statusText">Checking…</span>
  </div>
  <button id="toggleBtn">Pause Prism</button>
  <button id="optionsBtn" class="secondary">Settings</button>
  <p class="muted">ID: <span id="userId">-</span></p>
  <script type="module" src="popup.js"></script>
</body>
</html>
